<!DOCTYPE html>
<html>
<head>
    <title>Login - Vehicle Access</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1e1e2f;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-title {
            color: white;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            margin-top: 40px;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #ccc;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            width: 300px;
            text-align: center;
            margin: auto;
            margin-top: auto;
        }

        .login-box h1 {
            color: white;
            margin-bottom: 20px;
        }

        input[type="text"],
        input[type="password"] {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 10px;
            cursor: pointer;
        }

        .register-btn {
            background-color: #2196F3;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            color: white;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="main-title">
        Welcome to Vehicle Access Management
    </div>

    <div class="login-box">
        <h1>Login</h1>
        <form method="POST" action="/login">
            <input type="text" name="domain_id" placeholder="Enter your Domain ID" required>
            <input type="password" name="password" placeholder="Enter your Password" required>
            <button type="submit">Login</button>
        </form>

        <form action="/register">
            <button type="submit" class="register-btn">Register Here</button>
        </form>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
            <ul>
                {% for message in messages %}
                    <li>{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
        {% endwith %}
    </div>
</body>
</html>
