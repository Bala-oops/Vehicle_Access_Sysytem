<!DOCTYPE html>
<html>
<head>
    <title>Login - Vehicle Access</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1e1e2f;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-title {
            color: white;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            margin-top: 40px;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #ccc;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            width: 300px;
            text-align: center;
            margin: auto;
            margin-top: auto;
        }

        .login-box h1 {
            color: white;
            margin-bottom: 20px;
        }

        input[type="text"],
        input[type="password"] {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 10px;
            cursor: pointer;
        }

        .register-btn {
            background-color: #2196F3;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            color: white;
            font-size: 14px;
            margin-top: 10px;
        }

        /* 🔥 Demo Panel */
        .demo-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.08);
            padding: 15px;
            border-radius: 10px;
            width: 190px;
            box-shadow: 0 0 12px rgba(255,255,255,0.2);
        }

        .demo-panel h3 {
            color: white;
            font-size: 14px;
            margin-bottom: 10px;
            text-align: center;
        }

        .demo-panel button {
            width: 100%;
            margin-bottom: 6px;
            padding: 7px;
            font-size: 12px;
            border-radius: 6px;
            background-color: #2e7d32;
        }

        .demo-panel button:hover {
            background-color: #1b5e20;
        }
    </style>
</head>
<body>

    <div class="main-title">
        Welcome to Vehicle Access Management 
    </div>

    <!-- 🔥 Demo Access Panel -->
    <div class="demo-panel">
        <h3>Demo Access</h3>
        <button onclick="loginAs('admin')">Login as Admin</button>
        <button onclick="loginAs('employee')">Login as Employee</button>
        <button onclick="loginAs('hod')">Login as HOD</button>
        <button onclick="loginAs('security')">Login as Security</button>
    </div>

    <div class="login-box">
        <h1>Login</h1>
        <form method="POST" action="/login">
            <input type="text" name="domain_id" placeholder="Enter your Domain ID" required>
            <input type="password" name="password" placeholder="Enter your Password" required>
            <button type="submit">Login</button>
        </form>

        <form action="/register">
            <button type="submit" class="register-btn">Register Here</button>
        </form>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
            <ul>
                {% for message in messages %}
                    <li>{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
        {% endwith %}
    </div>

    <!-- 🔥 Auto Login Script -->
    <script>
        function loginAs(role) {
            const credentials = {
                admin: { id: "99999", pass: "1894" },
                employee: { id: "emp1011", pass: "raju" },
                hod: { id: "201", pass: "pass@it" },
                security: { id: "301", pass: "@123" }
            };

            const user = credentials[role];

            // Fill inputs
            document.querySelector('input[name="domain_id"]').value = user.id;
            document.querySelector('input[name="password"]').value = user.pass;

            // Submit form
            document.querySelector('form[action="/login"]').submit();
        }
    </script>

</body>
</html>
